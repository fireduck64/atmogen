video:
  width: 3840
  height: 2160
  duration_minutes: 6
  output_fps: 30
  output_dir: output/gem_9
  sparse_fps: 0.05  # Generates 1 frame every 20 seconds

engine: "local"
flux_all_sparse: false
flux_img2img: false
flux_denoise_strength: 0.95
controlnet:
  enabled: true
  type: "depth"
  control_strength: 0.35
keyframes:
  "00:00:00": 
    prompt: "An ancient infinite library with towering mahogany bookshelves stretching into darkness. Millions of dusty, leather-bound books pack the shelves. A warm, flickering candlelight casts long, dancing shadows."
    seed: 888
  "00:03:00": 
    prompt: "The paper and leather bound volumes begin to expand and contract. Millions of pages flutter slowly on their own, whispering quiet, incoherent words. The shelves take on a ribbed, bone-like appearance."
    seed: 999
  "00:06:00": 
    prompt: "A surreal, breathing labyrinth of paper and rot. The bookshelves have melted into colossal towers of layered paper skin, flickering with tiny blinking eyes. Floating pages swarm like moths under a ceiling of endless void."
    seed: 1111

soundtrack:
  enabled: true
  model: "facebook/musicgen-medium"
  engine: "elevenlabs"
  prompt: "soft scratching quill pens, fluttering paper pages, dusty whispering voices, ominous library clock ticks, warm flickering candlelight pads"
