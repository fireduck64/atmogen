video:
  width: 3840
  height: 2160
  duration_minutes: 6
  output_fps: 30
  output_dir: output/gem_3
  sparse_fps: 0.05  # Generates 1 frame every 20 seconds
engine: "local"
flux_all_sparse: false
flux_img2img: false
flux_denoise_strength: 0.95
controlnet:
  enabled: true
  type: "depth"
  control_strength: 0.35
keyframes:
  "00:00:00": 
    prompt: "A colossal, rusted Victorian greenhouse glass dome, half-shattered and reclaimed by a dark jungle. Dead exotic ferns and rotting orchids hang from iron struts. A creeping emerald fog fills the damp floor."
    seed: 412
  "00:03:00": 
    prompt: "The Victorian conservatory grows increasingly sinister. The vines and ferns thicken, mutating into fleshy, red-veined vines that rhythmically contract and expand. The shattered glass ceiling reveals a dark violet sky."
    seed: 512
  "00:06:00": 
    prompt: "A breathing organic womb of predatory flora. Towering carnivorous pods, pulsing red spore sacs, and weeping tendrils have entirely consumed the metal conservatory skeleton. Toxic amber pollen swirls in the thick mist."
    seed: 612

soundtrack:
  enabled: true
  model: "facebook/musicgen-medium"
  engine: "elevenlabs"
  prompt: "damp breathing botanical pads, slow rustling foliage pads, alien floral drones, ominous greenhouse hum, ticking vines"
