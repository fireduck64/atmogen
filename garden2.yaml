  "00:02:00": 
    prompt: "The garden is in full summer bloom."
    seed: 88
  "00:04:00": 
    prompt: "It is fall in the garden.  Some shrubs are still green but the trees are mostly bare."
    seed: 1024
  "00:06:00": 
    prompt: "It is winter in the garden.  The trees are now long black monsters."
    seed: 713
