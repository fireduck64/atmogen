keyframes:
  "00:00:00": 
    prompt: "An abandoned brutalist oil refinery at twilight, massive rusting pipes and high towers stretching into a sickly yellow sky. Heavy black smoke hangs motionless in the cold air. Cracks in the concrete show dirty oil pools."
    seed: 1001
  "00:03:00": 
    prompt: "The rusting refinery pipes begin to fuse and morph. The metal acquires a wet, muscular texture, with copper wiring spreading like nervous networks across the towers. Steam rises from venting, skin-like membranes."
    seed: 1002
  "00:06:00": 
    prompt: "A massive biomechanical hive of steel, copper, and pulsing muscle. Colossal towers breathe steam through fleshy chimneys, under a dark sky illuminated by flickering electrical discharge and sulfurous smog."
    seed: 1003

soundtrack:
  enabled: true
  model: "facebook/musicgen-medium"
