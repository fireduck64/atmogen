video:
  width: 3840
  height: 2160
  duration_minutes: 6
  output_fps: 30
  output_dir: output/gem_7
  sparse_fps: 0.05  # Generates 1 frame every 20 seconds
engine: "local"
flux_all_sparse: false
flux_img2img: false
flux_denoise_strength: 0.95
controlnet:
  enabled: true
  type: "depth"
  control_strength: 0.35
keyframes:
  "00:00:00": 
    prompt: "A vast barren desert of cracked black clay stretching under a cold, starless twilight. Colossal jagged obsidian stone formations rise like broken teeth from the dry ground. A low wind stirs dust devils."
    seed: 700
  "00:03:00": 
    prompt: "The obsidian rock structures begin to fracture and segment, revealing porous, calcified fossil marrow beneath. The ground splits further, venting a low, blue sulfurous steam that settles over the clay."
    seed: 800
  "00:06:00": 
    prompt: "A surreal valley of towering, petrified skeletal monuments. Colossal ribcages and spine-like monoliths rise into a sky of green cosmic dust and a shattered pale moon, their ancient hollows whistling in the wind."
    seed: 900

soundtrack:
  enabled: true
  model: "facebook/musicgen-medium"
  engine: "elevenlabs"
  prompt: "dry whistling desert wind, dusty obsidian stone drones, hollow ancient bone flutes, low sandstorm sub-bass, barren desolation"
